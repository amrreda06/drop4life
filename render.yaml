databases:
  - name: drop4life-db
    plan: free
    databaseName: drop4life
    user: drop4life

services:
  - type: web
    name: drop4life-api
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn drop4life_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    healthCheckPath: /api/test/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: https://amrreda06.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: drop4life-db
          property: connectionString
